<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #0589e0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 500px;
        }

        h1 { margin-bottom: 1.5rem; font-weight: 300; }

        .input-group {
            margin-bottom: 2rem;
        }

        input[type="datetime-local"] {
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 10px;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 5px;
            border-radius: 10px;
        }

        .number {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.8;
        }

        #mensagem {
            margin-top: 1rem;
            font-weight: bold;
            color: #ffeb3b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Contagem Regressiva Férias do Vicenzo</h1>
    
    <div class="input-group">
        <label for="dataInput">Escolha a data e hora:</label>
        <input type="datetime-local" id="dataInput">
    </div>

    <div class="countdown">
        <div class="box">
            <span class="number" id="dias">00</span>
            <span class="label">Dias</span>
        </div>
        <div class="box">
            <span class="number" id="horas">00</span>
            <span class="label">Horas</span>
        </div>
        <div class="box">
            <span class="number" id="minutos">00</span>
            <span class="label">Minutos</span>
        </div>
        <div class="box">
            <span class="number" id="segundos">00</span>
            <span class="label">Segundos</span>
        </div>
    </div>
    
    <p id="mensagem"></p>
</div>

<script>
    const inputData = document.getElementById('dataInput');
    const displayDias = document.getElementById('dias');
    const displayHoras = document.getElementById('horas');
    const displayMinutos = document.getElementById('minutos');
    const displaySegundos = document.getElementById('segundos');
    const mensagem = document.getElementById('mensagem');

    let intervalo;

    inputData.addEventListener('change', () => {
        clearInterval(intervalo);
        const dataAlvo = new Date(inputData.value).getTime();

        if (isNaN(dataAlvo)) return;

        intervalo = setInterval(() => {
            const agora = new Date().getTime();
            const diferenca = dataAlvo - agora;

            if (diferenca < 0) {
                clearInterval(intervalo);
                mensagem.innerText = "O tempo acabou!";
                zerarCampos();
                return;
            }

            mensagem.innerText = "";

            // Cálculos matemáticos
            const d = Math.floor(diferenca / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferenca % (1000 * 60)) / 1000);

            // Atualizar interface com zero à esquerda
            displayDias.innerText = d.toString().padStart(2, '0');
            displayHoras.innerText = h.toString().padStart(2, '0');
            displayMinutos.innerText = m.toString().padStart(2, '0');
            displaySegundos.innerText = s.toString().padStart(2, '0');

        }, 1000);
    });

    function zerarCampos() {
        displayDias.innerText = "00";
        displayHoras.innerText = "00";
        displayMinutos.innerText = "00";
        displaySegundos.innerText = "00";
    }
</script>

</body>
</html>
