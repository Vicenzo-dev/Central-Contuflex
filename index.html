<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temperos da Lê - Encomendas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #311d11;
            background-image: radial-gradient(#4a2c1a 10%, transparent 20%), 
                              radial-gradient(#4a2c1a 10%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
           
            padding-top: clamp(140px, 20vh, 160px); 
            padding-bottom: 110px; 
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }


        .hub-topo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #1a0d06 0%, #2c1a0f 100%);
            border-bottom: 3px solid #a86c34;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .hub-titulo {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #fce7cf;
            margin: 10px 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .hub-carrossel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            white-space: nowrap;
            padding: 10px 15px;
            gap: 12px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .hub-carrossel::-webkit-scrollbar {
            display: none;
        }

        .hub-item {
            flex: 0 0 auto;
            scroll-snap-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #754421;
            padding: 8px 16px;
            border-radius: 25px; 
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .hub-item.destaque {
            background: #a86c34;
            border-color: #f39c12;
            font-weight: 600;
        }

        .hub-item.total-carrinho {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border-color: #27ae60;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4);
            transition: all 0.2s ease;
        }


        .pulso {
            animation: pulse-animation 0.3s ease-out;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }


        .area-busca {
            margin: 15px auto 25px auto;
            padding: 0 15px;
            max-width: 600px;
            width: 100%;
        }

        .area-busca input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 30px;
            border: 2px solid #a86c34;
            background: rgba(20, 10, 5, 0.8);
            color: white;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .area-busca input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3), inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .container-temperos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); 
            gap: 15px;
            padding: 0 15px;
            max-width: 1200px;
            margin: 0 auto;
        }


        .tempero-card {
            background: linear-gradient(145deg, rgba(30, 15, 8, 0.95), rgba(20, 10, 5, 0.85));
            border: 1px solid #754421;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .tempero-card h3 {
            margin: 5px 0;
            font-size: 1.1rem;
            color: #fce7cf;
            line-height: 1.3;
        }

        .preco-info {
            font-size: 0.85rem;
            color: #d1a87b;
            margin: 5px 0 12px 0;
            font-weight: 600;
        }

        .tempero-card.esgotado {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(80%);
        }

        .selo-esgotado {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: none;
        }

        .tempero-card.esgotado .selo-esgotado {
            display: block;
        }

   
        .contador {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid #4a2c1a;
            margin-top: auto;
        }

        .contador button {
            background: linear-gradient(135deg, #a86c34, #8a5728);
            color: white;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            transition: transform 0.1s ease, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contador button:active {
            transform: scale(0.85);
            background: #f39c12;
        }

        .contador span {
            font-size: 1.1rem;
            font-weight: 700;
            width: 30px;
            color: #f39c12;
        }



        .creditos {
            font-size: 0.75rem;
            color: #d1a87b;
            margin-bottom: 8px;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        .creditos a {
            color: #f39c12;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .creditos a:hover {
            color: #2ecc71;
            text-decoration: underline;
        }


        .area-finalizar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 13, 6, 0.85);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 15px 0 calc(15px + env(safe-area-inset-bottom));
            z-index: 999;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.6);
            border-top: 1px solid rgba(168, 108, 52, 0.3);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 15px 30px;
            font-size: 1.15rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            width: 90%;
            max-width: 400px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.5px;
        }

        .btn-whatsapp:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

    <div class="hub-topo">
        <div class="hub-titulo">Temperos da Lê</div>
        <div class="hub-carrossel">
            <div class="hub-item" id="status-loja">⏳ Verificando horário...</div>
            
            <div class="hub-item total-carrinho" id="btn-total">🛒 Total: R$ <span id="valor-total">0,00</span></div>
            <div class="hub-item destaque">📍 Av. Hugo Schachetti, 289 - Jd. Zaíra</div>
            <div class="hub-item">💰 R$ 1,00 a colher</div>
            <div class="hub-item">🔥 Promo Baiano: 5 por R$ 3,00</div>
            <div class="hub-item">📞 (11) 96142-7444</div>
        </div>
    </div>

    <div class="area-busca">
        <input type="text" id="campo-busca" placeholder="🔍 Buscar tempero...">
    </div>

    <div class="container-temperos" id="lista-temperos"></div>

    <div class="area-finalizar">
        <div class="creditos">
            Desenvolvido por <a href="https://github.com/Vicenzo-dev" target="_blank">Vicenzo</a>
        </div>
        <button id="enviar-whatsapp" class="btn-whatsapp">📲 Enviar Pedido por WhatsApp</button>
    </div>

    <script>
      
        const tabelaPrecos = {
            padrao: 1.00,      
            alhoCabeca: 2.50    
        };

    
        const produtos = [
            { nome: "Chimi Churi", esgotado: false },
            { nome: "Ana Maria", esgotado: false },
            { nome: "Tempera tudo", esgotado: false },
            { nome: "Açafrão", esgotado: false },
            { nome: "Açafrão temperado", esgotado: false },
            { nome: "Edu Guedes", esgotado: false },
            { nome: "Lemon Pepper", esgotado: false },
            { nome: "Caldo de carne", esgotado: false },
            { nome: "Caldo de galinha", esgotado: false },
            { nome: "Caldo de bacon", esgotado: false },
            { nome: "Cominho", esgotado: false },
            { nome: "Pimenta calabresa", esgotado: false },
            { nome: "Pimenta do reino", esgotado: false },
            { nome: "Orégano", esgotado: false },
            { nome: "Coentro", esgotado: false },
            { nome: "Tempero Baiano", esgotado: false, promo: true },
            { nome: "Tempero gaúcho", esgotado: false },
            { nome: "Tempero mineiro", esgotado: false },
            { nome: "Vinagrete", esgotado: false },
            { nome: "Bicarbonato", esgotado: false },
            { nome: "Cravo", esgotado: false },
            { nome: "Cravo em pó", esgotado: false },
            { nome: "Canela em pau", esgotado: false },
            { nome: "Canela em pó", esgotado: false },
            { nome: "Master chef", esgotado: false },
            { nome: "Gourmet", esgotado: false },
            { nome: "Pega marido", esgotado: false },
            { nome: "Chimi Churi defumado", esgotado: false },
            { nome: "Colorau", esgotado: false },
            { nome: "Páprica defumada", esgotado: false },
            { nome: "Páprica picante", esgotado: false },
            { nome: "Páprica doce", esgotado: false },
            { nome: "Cebola granulada", esgotado: false },
            { nome: "Alho granulado", esgotado: false },
            { nome: "Fumaça em pó", esgotado: false },
            { nome: "Cebola alho e salsa", esgotado: false },
            { nome: "Curry", esgotado: false },
            { nome: "Ervas finas", esgotado: false },
            { nome: "Salsa", esgotado: false },
            { nome: "Coentro em folhas", esgotado: false },
            { nome: "Folhas de louro", esgotado: false },
            { nome: "Alecrim", esgotado: false },
            { nome: "Noz moscada", esgotado: false },
            { nome: "Gengibre em pó", esgotado: false },
            { nome: "Alho em pó", esgotado: false },
            { nome: "Cebola em pó", esgotado: false },
            { nome: "Manjericão", esgotado: false },
            { nome: "Tomilho", esgotado: false },
            { nome: "Cavalinha (Chá)", esgotado: false },
            { nome: "Erva doce (Chá)", esgotado: false },
            { nome: "Capim cidreira (Chá)", esgotado: false },
            { nome: "Camomila (Chá)", esgotado: false },
            { nome: "Alho em cabeça", esgotado: false, precoEspecial: "alhoCabeca" }
        ];

        const container = document.getElementById('lista-temperos');
        const valorTotalDisplay = document.getElementById('valor-total');
        const btnTotalCarrinho = document.getElementById('btn-total');

  
        produtos.forEach((produto, index) => {
            const card = document.createElement('div');
            card.className = `tempero-card ${produto.esgotado ? 'esgotado' : ''}`;
            card.setAttribute('data-nome', produto.nome);
            if(produto.promo) card.setAttribute('data-promo', 'true');
            if(produto.precoEspecial) card.setAttribute('data-preco-especial', produto.precoEspecial);
            
       
            card.style.animationDelay = `${index * 0.03}s`;

            let legendaPreco = `R$ ${tabelaPrecos.padrao.toFixed(2).replace('.', ',')} / colher`;
            if (produto.promo) {
                legendaPreco = "🔥 Promo: 5 por R$3";
            } else if (produto.precoEspecial) {
                const valorEspecial = tabelaPrecos[produto.precoEspecial];
                legendaPreco = `R$ ${valorEspecial.toFixed(2).replace('.', ',')} / unid.`;
            }

            card.innerHTML = `
                <div class="selo-esgotado">Esgotado</div>
                <h3>${produto.nome}</h3>
                <div class="preco-info">${legendaPreco}</div>
                <div class="contador">
                    <button class="btn-menos">-</button>
                    <span class="qtd">0</span>
                    <button class="btn-mais">+</button>
                </div>
            `;
            container.appendChild(card);
        });

        const cards = document.querySelectorAll('.tempero-card');

        function obterPrecoDoCard(card, qtd) {
            const tipoEspecial = card.getAttribute('data-preco-especial');
            const isPromo = card.hasAttribute('data-promo');

            if (isPromo) {
                const gruposDeCinco = Math.floor(qtd / 5);
                const sobra = qtd % 5;
                return (gruposDeCinco * 3) + (sobra * tabelaPrecos.padrao);
            } else if (tipoEspecial && tabelaPrecos[tipoEspecial] !== undefined) {
                return qtd * tabelaPrecos[tipoEspecial];
            } else {
                return qtd * tabelaPrecos.padrao;
            }
        }

        function calcularTotal() {
            let totalGeral = 0;
            cards.forEach(card => {
                if (!card.classList.contains('esgotado')) {
                    const qtd = parseInt(card.querySelector('.qtd').textContent);
                    if (qtd > 0) {
                        totalGeral += obterPrecoDoCard(card, qtd);
                    }
                }
            });
            
            valorTotalDisplay.textContent = totalGeral.toFixed(2).replace('.', ',');

     
            btnTotalCarrinho.classList.remove('pulso');
            void btnTotalCarrinho.offsetWidth; 
            btnTotalCarrinho.classList.add('pulso');

            return totalGeral;
        }

   
        cards.forEach(card => {
            const btnMenos = card.querySelector('.btn-menos');
            const btnMais = card.querySelector('.btn-mais');
            const displayQtd = card.querySelector('.qtd');
            let quantidade = 0;

            btnMais.addEventListener('click', () => {
                quantidade++;
                displayQtd.textContent = quantidade;
                calcularTotal();
            });

            btnMenos.addEventListener('click', () => {
                if (quantidade > 0) {
                    quantidade--;
                    displayQtd.textContent = quantidade;
                    calcularTotal();
                }
            });
        });

        const campoBusca = document.getElementById('campo-busca');
        const removerAcentos = str => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        campoBusca.addEventListener('input', (e) => {
            const termo = removerAcentos(e.target.value.toLowerCase());
            cards.forEach(card => {
                const nome = removerAcentos(card.getAttribute('data-nome').toLowerCase());
                card.style.display = nome.includes(termo) ? 'flex' : 'none';
            });
        });

        document.getElementById('enviar-whatsapp').addEventListener('click', () => {
            const numeroZap = "5511961427444"; 
            let corpoTexto = "Olá! Gostaria de fazer a seguinte encomenda:\n\n";
            let pediuAlgo = false;

            cards.forEach(card => {
                if(!card.classList.contains('esgotado')) {
                    const nome = card.getAttribute('data-nome');
                    const qtd = parseInt(card.querySelector('.qtd').textContent);
                    const tipoEspecial = card.getAttribute('data-preco-especial');

                    if (qtd > 0) {
                        const precoItem = obterPrecoDoCard(card, qtd);
                        const sufixoMedida = tipoEspecial ? "unid(s)" : "colher(es)";
                        
                        corpoTexto += `- ${qtd} ${sufixoMedida} de ${nome} (R$ ${precoItem.toFixed(2)})\n`;
                        pediuAlgo = true;
                    }
                }
            });

            const totalFinal = calcularTotal();
            corpoTexto += `\n💰 *Valor Total do Pedido:* R$ ${totalFinal.toFixed(2)}`;

            if (pediuAlgo) {
                const urlFinal = "https://wa.me/" + numeroZap + "?text=" + encodeURIComponent(corpoTexto);
                window.open(urlFinal, '_blank');
            } else {
                alert("Por favor, adicione itens ao carrinho antes de enviar!");
            }
        });
        function atualizarStatusLoja() {
            const agora = new Date();
            const diaSemana = agora.getDay(); 
            const horaAtual = agora.getHours();
            const minutoAtual = agora.getMinutes();
            const tempoAtualEmMinutos = (horaAtual * 60) + minutoAtual;

            const statusElemento = document.getElementById('status-loja');
            
            let aberto = false;
            let mensagemHorario = "";

            // ⚠️ NOTA SOBRE FERIADOS: 
            // Se você quiser tratar feriados, precisará ativar manualmente esta variável abaixo como 'true' nos dias de feriado.
            const ehFeriado = false; 

            if (ehFeriado) {
                // Feriados: 9:00 às 14:00 (540 min até 840 min)
                if (tempoAtualEmMinutos >= 540 && tempoAtualEmMinutos < 840) aberto = true;
                mensagemHorario = "Feriado: 9h às 14h";
            } else {
                switch (diaSemana) {
                    case 0: // Domingo
                        // 9:00 às 13:00 (540 min até 780 min)
                        if (tempoAtualEmMinutos >= 540 && tempoAtualEmMinutos < 780) aberto = true;
                        mensagemHorario = "Dom: 9h às 13h";
                        break;
                        
                    case 1: // Segunda-feira
                        aberto = false; // Loja Fechada
                        mensagemHorario = "Segunda: Fechado";
                        break;

                    case 2: // Terça
                    case 3: // Quarta
                    case 4: // Quinta
                    case 5: // Sexta
                        // Terça a Sexta: 9:00 às 18:00 (540 min até 1080 min)
                        if (tempoAtualEmMinutos >= 540 && tempoAtualEmMinutos < 1080) aberto = true;
                        mensagemHorario = "Terça a Sex: 9h às 18h";
                        break;

                    case 6: // Sábado
                        // Sábado: 9:00 às 14:30 (540 min até 870 min)
                        if (tempoAtualEmMinutos >= 540 && tempoAtualEmMinutos < 870) aberto = true;
                        mensagemHorario = "Sáb: 9h às 14:30h";
                        break;
                }
            }

            if (aberto) {
                statusElemento.innerHTML = `🟢 **Aberto** (${mensagemHorario})`;
                statusElemento.style.background = "rgba(39, 174, 96, 0.2)";
                statusElemento.style.borderColor = "#2ecc71";
            } else {
                statusElemento.innerHTML = `🔴 **Fechado** (${mensagemHorario})`;
                statusElemento.style.background = "rgba(231, 76, 60, 0.2)";
                statusElemento.style.borderColor = "#e74c3c";
            }
        }

        atualizarStatusLoja();
        
        setInterval(atualizarStatusLoja, 60000);
    </script>
</body>
</html>
